name: RIC Verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run RIC demo
        run: python scripts/ric_demo.py

      - name: Verify deterministic replay
        run: |
          python scripts/ric_demo.py > run1.txt
          python scripts/ric_demo.py > run2.txt
          diff run1.txt run2.txt
